# Continuous Integration — format, lint, test, and scan on every push and PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Secrets scan — belt-and-suspenders in case pre-commit hook wasn't installed
      # https://github.com/mongodb/kingfisher
      #
      # NOTE: Kingfisher does not publish checksums or signatures for its
      # release assets. HTTPS from GitHub is the only integrity guarantee.
      - name: Install Kingfisher
        env:
          # renovate: datasource=github-releases depName=mongodb/kingfisher
          KINGFISHER_VERSION: 1.90.0
        run: |
          curl -L "https://github.com/mongodb/kingfisher/releases/download/v${KINGFISHER_VERSION}/kingfisher-linux-x64.tgz" -o /tmp/kingfisher.tgz
          sudo tar -xzf /tmp/kingfisher.tgz -C /usr/local/bin kingfisher
          sudo chmod +x /usr/local/bin/kingfisher

      - name: Scan for Secrets
        run: |
          set +e
          OUTPUT=$(kingfisher scan --only-valid --exclude .git . 2>&1)

          # Extract and display the summary section
          SUMMARY=$(echo "$OUTPUT" | awk '/^=/{flag=1} flag')
          echo "$SUMMARY"

          # Add to job summary for GitHub UI
          echo "### 🔍 Secrets Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Only fail if there are successfully validated (active) secrets
          VALID_COUNT=$(echo "$OUTPUT" | grep "Successful Validations" | grep -oE '[0-9]+' || echo "0")
          if [ "$VALID_COUNT" -gt 0 ]; then
            echo "::error::$VALID_COUNT active secret(s) detected in repository"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --all
